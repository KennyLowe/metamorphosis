name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore Metamorphosis.sln

    - name: Build
      run: dotnet build Metamorphosis.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test tests/Metamorphosis.Core.Tests/Metamorphosis.Core.Tests.csproj --no-build --configuration Release --verbosity normal

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish Blazor WASM
      run: dotnet publish src/Metamorphosis.Web/Metamorphosis.Web.csproj -c Release -o release

    - name: Rewrite base href for GitHub Pages
      run: sed -i 's|<base href="/" />|<base href="/Meta/" />|g' release/wwwroot/index.html

    - name: Add .nojekyll
      run: touch release/wwwroot/.nojekyll

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: release/wwwroot

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
